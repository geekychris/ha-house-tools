name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q

      - name: Import-lint every script
        # Every setup_* / create_* script should import cleanly with
        # only stdlib available; catches accidental heavy imports.
        run: |
          for f in *.py; do
            [ "$f" = "install_all.py" ] && continue
            python -c "import ast; ast.parse(open('$f').read())"
          done
